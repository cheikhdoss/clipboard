name: ClipFlow
options:
  bundleIdPrefix: com.clipflow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  SWIFT_VERSION: "5.10"

targets:
  ClipFlow:
    type: application
    platform: iOS
    sources:
      - ClipFlow
      - Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipflow.app
      INFOPLIST_FILE: ClipFlow/Resources/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
    entitlements:
      path: ClipFlow/Resources/ClipFlow.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.clipflow.shared
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)$(CFBundleIdentifier)
    dependencies:
      - target: ClipFlowKeyboard
      - target: ClipFlowPIP
    info:
      path: ClipFlow/Resources/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CKContainerIdentifier: iCloud.com.clipflow.app
        CKDefaultSubscriptionID: clipflow-sync

  ClipFlowKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - ClipFlowKeyboard
      - Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipflow.app.keyboard
      INFOPLIST_FILE: ClipFlowKeyboard/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
    entitlements:
      path: Shared/Shared.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.clipflow.shared
    info:
      path: ClipFlowKeyboard/Info.plist
      properties:
        NSExtension:
          NSExtensionPrincipalClass: KeyboardViewController
          NSExtensionAttributes:
            PrimaryLanguage: fr-FR
            SupportsAudio: NO
            IsASCIICapable: NO
            RequestsOpenAccess: YES

  ClipFlowPIP:
    type: app-extension
    platform: iOS
    sources:
      - ClipFlowPIP
      - Shared
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.clipflow.app.pip
      INFOPLIST_FILE: ClipFlowPIP/Info.plist
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_STYLE: Manual
    info:
      path: ClipFlowPIP/Info.plist
      properties:
        NSExtension:
          NSExtensionPrincipalClass: PiPContentController
          NSExtensionPointIdentifier: com.apple.avkit.picture-in-picture
